name: Test, build and deploy to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    # Run tests on PRs too, but don't deploy them
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------
  # 1) Test — runs unit tests. Required to succeed before build.
  # ---------------------------------------------------------------------
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # svelte-kit sync regenerates .svelte-kit/tsconfig.json which the
      # project tsconfig.json extends — vitest needs that to resolve types.
      - name: Generate SvelteKit types
        run: npx svelte-kit sync

      - name: Run unit tests
        run: npm test

  # ---------------------------------------------------------------------
  # 2) Build — only runs if tests pass. Skipped for PRs.
  # ---------------------------------------------------------------------
  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          # Repo base path; e.g. /sensor-pwa for github.com/<user>/sensor-pwa
          BASE_PATH: /${{ github.event.repository.name }}
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: build

  # ---------------------------------------------------------------------
  # 3) Deploy — publishes the artifact to GitHub Pages.
  # ---------------------------------------------------------------------
  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
